name: Update MTProto Proxies

on:
  schedule:
    - cron: '0 */12 * * *' # Har 12 ghante mein chalega
  workflow_dispatch: # Manual chalane ke liye

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxies.txt proxies.json
          git commit -m "Automated proxy update: $(date)" || echo "No changes to commit"
          git push
          
